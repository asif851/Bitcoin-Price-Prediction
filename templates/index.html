<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Close Price Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .container {
            background: #ffffff;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 400px;
        }
        h1 {
            text-align: center;
            color: #333333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            color: #555555;
            font-weight: bold;
        }
        input {
            margin-top: 5px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ffe9;
            border: 1px solid #d4ffd4;
            border-radius: 4px;
            color: #1a7f1a;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Close Price Prediction</h1>
        <form method="POST" action="/predict">
            <label for="Open">Open:</label>
            <input type="number" step="0.01" id="Open" name="Open" required>

            <label for="High">High:</label>
            <input type="number" step="0.01" id="High" name="High" required>

            <label for="Low">Low:</label>
            <input type="number" step="0.01" id="Low" name="Low" required>

            <label for="Volume">Volume:</label>
            <input type="number" id="Volume" name="Volume" required>

            <label for="Month">Month:</label>
            <input type="number" id="Month" name="Month" required>

            <label for="Day">Day:</label>
            <input type="number" id="Day" name="Day" required>

            <label for="Year">Year:</label>
            <input type="number" id="Year" name="Year" required>

            <label for="Daily_Return">Daily Return:</label>
            <input type="number" step="0.01" id="Daily_Return" name="Daily_Return" required>

            <label for="MA_7">7-day MA:</label>
            <input type="number" step="0.01" id="MA_7" name="MA_7" required>

            <label for="MA_30">30-day MA:</label>
            <input type="number" step="0.01" id="MA_30" name="MA_30" required>

            <label for="Volatility_30">30-day Volatility:</label>
            <input type="number" step="0.01" id="Volatility_30" name="Volatility_30" required>

            <button type="submit">Predict Close</button>
        </form>

        {% if prediction %}
        <div class="result">
            Predicted Close Price: {{ prediction[0] }}
        </div>
        {% endif %}
    </div>
</body>
</html>
