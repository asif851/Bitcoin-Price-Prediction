<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Close Price Prediction</title>
    <style>
        /* Global styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #edf2f7; /* Light grayish blue */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Form container styles */
        .container {
            background: #ffffff; /* White background */
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15); /* Subtle shadow */
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333333; /* Dark gray */
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Form layout */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal-width columns */
            gap: 20px;
        }

        /* Labels */
        label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #555555; /* Medium gray */
        }

        /* Input fields */
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box; /* Include padding in width */
        }

        /* Button */
        button {
            grid-column: span 2; /* Span both columns */
            padding: 12px;
            font-size: 16px;
            background-color: #007bff; /* Blue color */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3; /* Darker blue on hover */
        }

        /* Result box */
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f5e9; /* Light green background */
            border: 1px solid #a5d6a7; /* Subtle green border */
            border-radius: 6px;
            color: #2e7d32; /* Dark green text */
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bitcoin Close Price Prediction</h1>
        <form method="POST" action="/predict">
            <!-- Form inputs -->
            <div>
                <label for="Open">Open:</label>
                <input type="number" step="0.01" id="Open" name="Open" required>
            </div>
            <div>
                <label for="High">High:</label>
                <input type="number" step="0.01" id="High" name="High" required>
            </div>
            <div>
                <label for="Low">Low:</label>
                <input type="number" step="0.01" id="Low" name="Low" required>
            </div>
            <div>
                <label for="Volume">Volume:</label>
                <input type="number" id="Volume" name="Volume" required>
            </div>
            <div>
                <label for="Month">Month:</label>
                <input type="number" id="Month" name="Month" required>
            </div>
            <div>
                <label for="Day">Day:</label>
                <input type="number" id="Day" name="Day" required>
            </div>
            <div>
                <label for="Year">Year:</label>
                <input type="number" id="Year" name="Year" required>
            </div>
            <div>
                <label for="Daily_Return">Daily Return:</label>
                <input type="number" step="0.01" id="Daily_Return" name="Daily_Return" required>
            </div>
            <div>
                <label for="MA_7">7-day MA:</label>
                <input type="number" step="0.01" id="MA_7" name="MA_7" required>
            </div>
            <div>
                <label for="MA_30">30-day MA:</label>
                <input type="number" step="0.01" id="MA_30" name="MA_30" required>
            </div>
            <div>
                <label for="Volatility_30">30-day Volatility:</label>
                <input type="number" step="0.01" id="Volatility_30" name="Volatility_30" required>
            </div>
            <button type="submit">Predict Close</button>
        </form>

        <!-- Result box -->
        {% if prediction %}
        <div class="result">
            Predicted Close Price: {{ prediction[0] }}
        </div>
        {% endif %}
    </div>
</body>
</html>
